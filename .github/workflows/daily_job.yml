name: Daily Tech News Push

on:
  schedule:
    # 每天北京时间早上 7:00 运行 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 允许手动点击运行，方便测试

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      - name: 执行抓取、AI 总结和推送
        env:
          SC_SENDKEY: ${{ secrets.SC_SENDKEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python daily_news.py